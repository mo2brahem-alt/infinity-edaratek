name: Auto Deploy to Webmin Server

on:
  push:
    branches:
      - main  # سيتم التشغيل التلقائي عند الرفع على فرع main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASS }}
          port: 22 # تأكد أن بورت الـ SSH في سيرفرك هو 22
          script: |
            cd /home/test/public_html
            # إخبار Git أن المجلد آمن لتجنب الخطأ السابق
            git config --global --add safe.directory /home/test/public_html
            
            # سحب الكود الجديد
            git pull origin main
            
            # تحديث مكتبات Laravel
            composer install --no-dev --optimize-autoloader
            
            # بناء ملفات Vue 3
            npm install
            npm run build
            
            # تنظيف الكاش الخاص بلارافيل
            php artisan optimize:clear
            
            echo "Deployment Successful!"    